<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Word Unscrambler Pro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(140deg, #0f172a, #111827 50%, #0e7490);
      color: #f8fafc;
      font-family: "Segoe UI", sans-serif;
      padding: 1rem;
    }
    .card {
      max-width: 520px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0 0 0.5rem; }
    p { opacity: 0.9; line-height: 1.45; }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>Word Unscrambler Pro is still available for previously cached dictionaries and pages.</p>
    <p>Reconnect for fresh dictionary updates and social sharing.</p>
  </main>
</body>
</html>
